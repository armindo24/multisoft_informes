function remover(selectbox){
    var i;
    for(i=selectbox.options.length-1;i>=0;i--)
    {
        selectbox.remove(i);
    }
} 

function SelectElement(value,name){    
    var element = document.getElementsByName(name)[0];
    element.value = value;
}

function addCommas(nStr)
{
	nStr += '';
	x = nStr.split('.');
	x1 = x[0];
	x2 = x.length > 1 ? ',' + x[1] : '';
	var rgx = /(\d+)(\d{3})/;
	while (rgx.test(x1)) {
		x1 = x1.replace(rgx, '$1' + '.' + '$2');
	}
	return x1 + x2;
}

function buscar_cuenta(){
	$.get("http://"+aux1[0]+":3000/api/v1/cuenta/select/"+document.getElementsByName('empresa')[0].value+"/"+document.getElementsByName('periodo')[0].value,
	    function(data) 	{
	    	if (data != null){
	    		var select = document.getElementsByName("cuentad")[0]
	    		var select1 = document.getElementsByName("cuentah")[0]
	    		remover(select);
	    		remover(select1);
				for (var i=0;i < data.data.length;i++){
					var option = document.createElement("option");
					var option1 = document.createElement("option");
					option.value = data.data[i].CodPlanCta;
					option.text =data.data[i].Nombre;
					option1.value = data.data[i].CodPlanCta;
					option1.text =data.data[i].Nombre;
					select.add(option);
					select1.add(option1);
				}
				SelectElement(data.data[0].CodPlanCta,'cuentad')
				SelectElement(data.data[0].CodPlanCta,'cuentah')
	    	}
	    }
	);  
	
	$('.chosen-select').trigger('chosen:updated');   
}

function cambiar_anho(a){
	var vector_desde = $('[name=fechad]').val().split('-')
	var vector_hasta =$('[name=fechah]').val().split('-')
	
	$('[name=fechad]').val(a+'-'+vector_desde[1]+'-'+vector_desde[2])
	$('[name=fechah]').val(a+'-'+vector_hasta[1]+'-'+vector_hasta[2])
}
