<script type="text/javascript">
  var current_asiento = 0;
  var total_debito = 0;
  var total_credito = 0;
  var total_debito_me = 0;
  var total_credito_me = 0;

  var addCommas = u.addCommas;
  var convertir_rever = u.convertir_rever;

  var $select_empresa, select_empresa;
  var $select_tipo_asiento, select_tipo_asiento;

  var api = u.getApiUrl();
  var query = {};

  $(document).ready(function () {
    u.hideNav();
    initDates();
    initSelects();
  });

  function initDates() {
    var $inputDate = $(".input-date .form-control");
    u.defaultDatepicker();
    $(".input-daterange").datepicker({
      todayBtn: "linked",
      format: "yyyy-mm-dd"
    });

    $inputDate.datepicker().on('changeDate', function (e) {
      query[this.name] = this.value;
      console.log(query);
    });

    $inputDate.datepicker('setDate', new Date());
    $inputDate.datepicker('update');
  }

  function initSelects() {
    $.extend(true, $.fn.selectize.defaults, {
      onChange: function (value) {
        query[this.$input.attr('name')] = value;
      }
    });

    $select_empresa = $('#select-empresa').selectize({
      valueField: 'Cod_Empresa',
      labelField: 'Des_Empresa',
      searchField: 'Des_Empresa'
    });
    select_empresa = $select_empresa[0].selectize;
    select_empresa.load(function (cb) {
      u.get_empresas({{ user }}, function (res) {
        cb(res.data);
      });
    });

    $select_tipo_asiento = $('#select-tipoAsiento').selectize({
      valueField: 'TipoAsiento',
      labelField: 'Descrip',
      searchField: 'Descrip'
    });
    select_tipo_asiento = $select_tipo_asiento[0].selectize;
    select_tipo_asiento.load(function (cb) {
      $.ajax({
        url: api + 'tipoasiento/select',
        method: 'GET'
      }).done(function (res) {
        cb(res.data);
      });
    });

    $('#select-autorizado').selectize({
      options: [
        {value: 'TO', text: 'Todos'},
        {value: 'SI', text: 'No'},
        {value: 'NO', text: 'Si'}
      ]
    });

    $('#select-moneda').selectize({
      options: [
        {value: 'LO', text: 'Local'},
        {value: 'EX', text: 'Extranjera'},
        {value: 'AM', text: 'Ambas'}
      ]
    });
  }

  function getInforme() {
    var empresa = query.empresa;
    var desde = query.fechad;
    var hasta = query.fechah;
    var tipoasiento = query.tipoAsiento
    var autorizado = query.autorizado;
    var moneda = query.moneda;
    $('.collapse').collapse('hide')
    $('#table-div').empty()
    $('#table-div').append("<b>Recuperando datos.</b>")
    var pathParams = [empresa, tipoasiento, desde, hasta, autorizado];
    $.get(api + 'diariocomprobado/list/' + pathParams.join('/'),
            function (data) {
              if (data.data.length > 0) {
                $('#table-div').empty()
                console.log(data)
                var string = ""
                for (var a = 0; a < data.data.length; a++) {
                  if (parseInt(data.data[a].NroTransac) != parseInt(current_asiento)) {
                    if (total_debito > 0 || total_credito > 0 || total_debito_me > 0 || total_credito_me > 0) {
                      if (moneda == 'AM') {
                        string += '<tr><td colspan="6" style="text-align: right;"><b>TOTALES</b></td>' +
                                '<td style="text-align: right;"><b>' + convertir_rever(total_debito) + '</b></td>' +
                                '<td style="text-align: right;"><b>' + convertir_rever(total_credito) + '</b></td>' +
                                '<td style="text-align: right;"><b>' + addCommas((Math.round(total_debito_me * 100) / 100).toString()) + '</b></td>' +
                                '<td style="text-align: right;"><b>' + addCommas((Math.round(total_credito_me * 100) / 100).toString()) + '</b></td></tr>'
                      } else if (moneda == 'LO') {
                        string += '<tr><td colspan="6" style="text-align: right;"><b>TOTALES</b></td>' +
                                '<td style="text-align: right;"><b>' + convertir_rever(total_debito) + '</b></td>' +
                                '<td style="text-align: right;"><b>' + convertir_rever(total_credito) + '</b></td></tr>'
                      } else {
                        string += '<tr><td colspan="6" style="text-align: right;"><b>TOTALES</td>' +
                                '<td style="text-align: right;"><b>' + addCommas((Math.round(total_debito_me * 100) / 100).toString()) + '</b></td>' +
                                '<td style="text-align: right;"><b>' + addCommas((Math.round(total_credito_me * 100) / 100).toString()) + '</b></td></tr>'
                      }
                    }
                    string += '</table></div>'
                    string += '<div id="asiento-' + data.data[a].NroTransac + '">' +
                            '<table class="table table-striped table-hover table-bordered table-filter scroll" tyle="width:90%">' +
                            '<td style="width:8%"><b>Tipo Cbte.:</b></td>' +
                            '<td>' + data.data[a].TIPOASIENTO + '</td>' +
                            '<td style="width:10%"><b>Nro. de Cbte.:</b></td>'
                    if (data.data[a].NroCompr == null) {
                      string += '<td style="width:12%">&nbsp;</td>'
                    } else {
                      string += '<td style="width:12%">' + data.data[a].NroCompr + '</td>'
                    }
                    string += '<td style="width:12%"><b>Nro. De Transac.:</b></td>' +
                            '<td style="width:8%">' + data.data[a].NroTransac + '</td>' +
                            '<td style="width:12%"><b>Fecha De Transac.:</b></td>' +
                            '<td style="width:8%">' + data.data[a].Fecha + '</td>' +
                            '</table>' +
                            '<table style="width:100%" class="table table-striped"><tr>'
                    if (moneda == 'AM') {
                      string += '<th style="width:3%">Sec.</th><th style="width:7%">Cuenta</th><th style="width:15%"></th><th style="width:7%">Auxiliar</th><th style="width:15%"></th><th style="width:19%">Concepto</th><th style="width:8%">Debe M.L.</th><th style="width:8%">Haber M.L.</th><th style="width:8%">Debe M.E.</th><th style="width:8%">Haber M.E.</th></tr>'
                    } else {
                      string += '<th style="width:3%">Sec.</th><th style="width:7%">Cuenta</th><th style="width:18%"></th><th style="width:7%">Auxiliar</th><th style="width:18%"></th><th style="width:27%">Concepto</th><th style="width:10%">Debe</th><th style="width:10%">Haber</th></tr>'
                    }

                    total_debito = 0
                    total_credito = 0
                    total_debito_me = 0
                    total_credito_me = 0
                  }
                  total_debito += parseInt(data.data[a].DEBITO)
                  total_credito += parseInt(data.data[a].CREDITO)
                  total_debito_me += parseFloat(data.data[a].DEBITO_ME)
                  total_credito_me += parseFloat(data.data[a].CREDITO_ME)

                  string += '<tr>' +
                          '<td>' + data.data[a].Linea + '</td>' +
                          '<td>' + data.data[a].CodPlanCta + '</td>' +
                          '<td>' + data.data[a].NOMBRECUENTA + '</td>'
                  if (data.data[a].CodPlanAux != null) {
                    string += '<td>' + data.data[a].CodPlanAux + '</td>' +
                            '<td>' + data.data[a].NOMBRECUENTAAUX + '</td>'
                  } else {
                    string += '<td>&nbsp;</td>' +
                            '<td>&nbsp;</td>'
                  }
                  string += '<td>' + data.data[a].Concepto + '</td>'
                  if (moneda == 'AM') {
                    string += '<th style="text-align: right;">' + convertir_rever(data.data[a].DEBITO) + '</th>' +
                            '<th style="text-align: right;">' + convertir_rever(data.data[a].CREDITO) + '</th>' +
                            '<th style="text-align: right;">' + addCommas((Math.round(data.data[a].DEBITO_ME * 100) / 100).toString()) + '</th>' +
                            '<th style="text-align: right;">' + addCommas((Math.round(data.data[a].CREDITO_ME * 100) / 100).toString()) + '</th>'
                  } else if (moneda == 'LO') {
                    string += '<th style="text-align: right;">' + convertir_rever(data.data[a].DEBITO) + '</th>' +
                            '<th style="text-align: right;">' + convertir_rever(data.data[a].CREDITO) + '</th>'
                  } else {
                    string += '<th style="text-align: right;">' + addCommas((Math.round(data.data[a].DEBITO_ME * 100) / 100).toString()) + '</th>' +
                            '<th style="text-align: right;">' + addCommas((Math.round(data.data[a].CREDITO_ME * 100) / 100).toString()) + '</th>'
                  }
                  '</tr>'
                  current_asiento = parseInt(data.data[a].NroTransac)

                }
                $('#table-div').append(string);
                total_debito = 0
                total_credito = 0
                total_debito_me = 0
                total_credito_me = 0
              } else {
                $('#table-div').empty()
                $('#table-div').append("<b>No se han encontrado datos.</b>")
              }
            }
    );
  }
</script>
