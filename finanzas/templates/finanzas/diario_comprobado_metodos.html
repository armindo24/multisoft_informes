<script type="text/javascript">
  var total_debito = 0;
  var total_credito = 0;
  var total_debito_me = 0;
  var total_credito_me = 0;

  var addCommas = u.addCommas;
  var convertir_rever = u.convertir_rever;

  var $select_empresa, select_empresa;
  var $select_tipo_asiento, select_tipo_asiento;
  
  var $messages, $loading, $empty;

  var api = u.getApiUrl();
  var query = {};

  $(document).ready(function () {
    $messages = $("#messages");
    $loading = $messages.find("#loading");
    $empty = $messages.find("#empty");
    
    u.hideNav();
    initDates();
    initSelects();
  });

  function initDates() {
    var $inputDate = $(".input-date .form-control");
    u.defaultDatepicker();
    $(".input-daterange").datepicker({
      todayBtn: "linked",
      format: "yyyy-mm-dd",
      autoclose: true
    });

    $inputDate.datepicker().on('changeDate', function (e) {
      query[this.name] = this.value;
    });

    $inputDate.datepicker('setDate', new Date());
    $inputDate.datepicker('update');
  }

  function initSelects() {
    $.extend(true, $.fn.selectize.defaults, {
      onChange: function (value) {
        query[this.$input.attr('name')] = value;
      }
    });

    $select_empresa = $('#select-empresa').selectize({
      valueField: 'Cod_Empresa',
      labelField: 'Des_Empresa',
      searchField: 'Des_Empresa'
    });
    select_empresa = $select_empresa[0].selectize;
    select_empresa.load(function (cb) {
      u.get_empresas({{ user }},'Integrado', function (res) {
        cb(res.data);
      });
    });

    $select_tipo_asiento = $('#select-tipoAsiento').selectize({
      valueField: 'TipoAsiento',
      labelField: 'Descrip',
      searchField: 'Descrip'
    });
    select_tipo_asiento = $select_tipo_asiento[0].selectize;
    select_tipo_asiento.load(function (cb) {
      $.ajax({
        url: api + 'tipoasiento/select',
        method: 'GET'
      }).done(function (res) {
        cb(res.data);
      });
    });

    $('#select-autorizado').selectize({
      options: [
        {value: 'TO', text: 'Todos'},
        {value: 'SI', text: 'No'},
        {value: 'NO', text: 'Si'}
      ]
    });

    $('#select-moneda').selectize({
      options: [
        {value: 'LO', text: 'Local'},
        {value: 'EX', text: 'Extranjera'},
        {value: 'AM', text: 'Ambas'}
      ]
    });
  }


  function getInforme() {
    var current_asiento = 0;
    var nro_transac_list = [];
    var empresa = query.empresa;
    var desde = query.fechad;
    var hasta = query.fechah;
    var tipoasiento = query.tipoAsiento;
    var autorizado = query.autorizado;
    var moneda = query.moneda;
    $('.collapse').collapse('hide')
    $loading.show();
    $empty.hide();
    $('#table-div').empty()
    $.get(api + "diariocomprobado/list/" + empresa + "/" + tipoasiento + "/" + desde + "/" + hasta + "/" + autorizado,
            function (data) {
              if (data.data.length > 0) {
                var string = ""
                for (var a = 0; a < data.data.length; a++) {
                  if (parseInt(data.data[a].NroTransac) != parseInt(current_asiento)) {
                    string += '<div id="asiento-' + data.data[a].NroTransac + '">' +
                            '<table class="table table-striped table-bordered nowrap tablaaa" style="width:100%"><thead>' +
                            '<th>Tipo Cbte.:</th>' +
                            '<th>Nro. de Cbte.:</th>';
                    string += '<th>Nro. De Transac.:</th>' +
                            
                            '<th>Fecha De Transac.:</th>' +
                            '</thead><tbody><tr>'+
                            '<td>' + data.data[a].TIPOASIENTO + '</td>' 
                            if (data.data[a].NroCompr == null) {
                              string += '<td>&nbsp;</td>';
                            } else {
                              string += '<td>' + data.data[a].NroCompr + '</td>';
                            }
                            string += '<td>' + data.data[a].NroTransac + '</td>' +
                            '<td>' + data.data[a].Fecha + '</td>' +
                            '</tr></tbody></table>'+
                            '<table id="tabla_' + data.data[a].NroTransac + '" class="table table-striped table-bordered nowrap" cellspacing="0" style="width:100%">'
                    if (moneda == 'AM') {
                      string += '<thead>' +
                              '<th>Sec.</th>' +
                              '<th>Cuenta</th>' +
                              '<th>Nombre</th>' +
                              '<th>Auxiliar</th>' +
                              '<th>Nombre</th>' +
                              '<th>Concepto</th>' +
                              '<th>Debe M.L.</th>' +
                              '<th>Haber M.L.</th>' +
                              '<th>Debe M.E.</th>' +
                              '<th>Haber M.E.</th>' +
                              '</tr></thead><tbody></tbody><tfoot></tfoot></table></div>';
                    } else {
                      string += '<thead>' +
                              '<th>Sec.</th>' +
                              '<th>Cuenta</th>' +
                              '<th>Nombre</th>' +
                              '<th>Auxiliar</th>' +
                              '<th>Nombre</th>' +
                              '<th>Concepto</th>' +
                              '<th>Debe</th>' +
                              '<th>Haber</th>' +
                              '</tr></thead><tbody></tbody><tfoot></tfoot></table></div>';
                    }
                    nro_transac_list.push(data.data[a].NroTransac)
                    current_asiento = parseInt(data.data[a].NroTransac)
                    
                  }
                }
                
                console.log(string);
                
                $('#table-div').append(string);
                
                $('.tablaaa').DataTable({
                    searching: false,
                    language: u.spanish_dt,
                    paging: false,
                    ordering: false,
                    info: false,
                    scrollCollapse: true,
                    scrollY: 300,
                    scrollX: '100%',
                  });
                
                for (var a = 0; a < nro_transac_list.length; a++) {
                  total_debito = 0
                  total_credito = 0
                  total_debito_me = 0
                  total_credito_me = 0
                  var string2 = ""
                  var string3 = ""
                  for (var b = 0; b < data.data.length; b++) {
                    string2 += '<tr>' +
                            '<td>' + data.data[b].Linea + '</td>' +
                            '<td>' + data.data[b].CodPlanCta + '</td>' +
                            '<td>' + data.data[b].NOMBRECUENTA + '</td>'
                    if (data.data[b].CodPlanAux != null) {
                      string2 += '<td>' + data.data[b].CodPlanAux + '</td>' +
                              '<td>' + data.data[b].NOMBRECUENTAAUX + '</td>'
                    } else {
                      string2 += '<td>&nbsp;</td>' +
                              '<td>&nbsp;</td>'
                    }
                    string2 += '<td>' + data.data[b].Concepto + '</td>'
                    if (moneda == 'AM') {
                      string2 += '<th style="text-align: right;">' + convertir_rever(data.data[b].DEBITO) + '</th>' +
                              '<th style="text-align: right;">' + convertir_rever(data.data[b].CREDITO) + '</th>' +
                              '<th style="text-align: right;">' + addCommas((Math.round(data.data[b].DEBITO_ME * 100) / 100).toString()) + '</th>' +
                              '<th style="text-align: right;">' + addCommas((Math.round(data.data[b].CREDITO_ME * 100) / 100).toString()) + '</th>'
                    } else if (moneda == 'LO') {
                      string2 += '<th style="text-align: right;">' + convertir_rever(data.data[b].DEBITO) + '</th>' +
                              '<th style="text-align: right;">' + convertir_rever(data.data[b].CREDITO) + '</th>'
                    } else {
                      string2 += '<th style="text-align: right;">' + addCommas((Math.round(data.data[b].DEBITO_ME * 100) / 100).toString()) + '</th>' +
                              '<th style="text-align: right;">' + addCommas((Math.round(data.data[b].CREDITO_ME * 100) / 100).toString()) + '</th>'
                    }
                    string2 += '</tr>';
                    total_debito += parseInt(data.data[b].DEBITO)
                    total_credito += parseInt(data.data[b].CREDITO)
                    total_debito_me += parseFloat(data.data[b].DEBITO_ME)
                    total_credito_me += parseFloat(data.data[b].CREDITO_ME)
                  }
                  if (moneda == 'AM') {
                    string3 += '<tr><td colspan="6" style="text-align: right;"><b>TOTALES</b></td>' +
                            '<td style="text-align: right;"><b>' + convertir_rever(total_debito) + '</b></td>' +
                            '<td style="text-align: right;"><b>' + convertir_rever(total_credito) + '</b></td>' +
                            '<td style="text-align: right;"><b>' + addCommas((Math.round(total_debito_me * 100) / 100).toString()) + '</b></td>' +
                            '<td style="text-align: right;"><b>' + addCommas((Math.round(total_credito_me * 100) / 100).toString()) + '</b></td></tr>'
                  } else if (moneda == 'LO') {
                    string3 += '<tr><td colspan="6" style="text-align: right;"><b>TOTALES</b></td>' +
                            '<td style="text-align: right;"><b>' + convertir_rever(total_debito) + '</b></td>' +
                            '<td style="text-align: right;"><b>' + convertir_rever(total_credito) + '</b></td></tr>'
                  } else {
                    string3 += '<tr><td colspan="6" style="text-align: right;"><b>TOTALES</td>' +
                            '<td style="text-align: right;"><b>' + addCommas((Math.round(total_debito_me * 100) / 100).toString()) + '</b></td>' +
                            '<td style="text-align: right;"><b>' + addCommas((Math.round(total_credito_me * 100) / 100).toString()) + '</b></td></tr>'
                  }
                  $('#tabla_' + nro_transac_list[a] + ' tbody').html(string2)
                  $('#tabla_' + nro_transac_list[a] + ' tfoot').html(string3)
                  
                  $('#tabla_' + nro_transac_list[a]).DataTable({
                    searching: false,
                    language: u.spanish_dt,
                    paging: false,
                    ordering: false,
                    info: false,
                    scrollCollapse: true,
                    scrollY: 300,
                    scrollX: '100%',
                  });
                  
                }
              } else {
                $('#table-div').empty()
                $empty.show();
                }
            $loading.hide();
            });
  }
</script>
