  function initDates() {
    u.defaultDatepicker();
    var $range = $("#fecha");

    var $desde = $range.find(".desde.form-control");
    var $hasta = $range.find(".hasta.form-control");
    var $allDates = $(".input-date .form-control");
    $year.datepicker({
      format: "yyyy",
      startView: 2,
      minViewMode: 2,
      maxViewMode: 2,
      autoclose: true,
      todayBtn: "linked"
    });

    $desde.datepicker({
      format: "yyyy-mm-dd",
      maxViewMode: 1
    });

    $hasta.datepicker({
      format: "yyyy-mm-dd",
      maxViewMode: 1
    });

    $range.datepicker({
      inputs: [$desde, $hasta]
    });

    $('.input-daterange .form-control').on('changeDate', function (e) {
      query[this.name] = this.value;
    });

    $year.datepicker().on('changeDate', function (e) {
      query.periodo = this.value;
      buscar_cuenta();
      var desdeNewDate = $desde.datepicker('getDate'); //get fecha actual
      var hastaNewDate = $hasta.datepicker('getDate'); //get fecha actual
      if (desdeNewDate && hastaNewDate) { //if not null
        var startDate = new Date(this.value, 0, 1); //set new year start
        var endDate = new Date(this.value, 11, 31); //set new year end
        desdeNewDate.setFullYear(this.value); //change fecha actual year
        $desde.datepicker('setStartDate', startDate);
        $desde.datepicker('setEndDate', endDate);
        $desde.datepicker('setDate', desdeNewDate);
        $desde.datepicker('update');

        hastaNewDate.setFullYear(this.value); //set new year actual
        $hasta.datepicker('setStartDate', startDate);
        $hasta.datepicker('setEndDate', endDate);
        $hasta.datepicker('setDate', hastaNewDate);
        $hasta.datepicker('update');
      }
    });

  }

  function buscar_cuenta() {
    // resetear selects
    u.resetSelect(select_cuentad);
    u.resetSelect(select_cuentah);
    if (!query.empresa || !query.empresa.length || !query.periodo || !query.periodo.length) return;

    $.ajax({
      url: api + 'cuenta/select/' + query.empresa + '/' + query.periodo,
      method: 'GET'
    }).done(function (d) {
      //cargar resultados y habilitar options
      select_cuentad.load(function (cb) {
        cb(d.data);
        select_cuentad.enable();
      });

      select_cuentah.load(function (cb) {
        cb(d.data);
        select_cuentah.enable();
      });
    }).fail(function () {
      select_cuentad.load(function (cb) {
        cb();
      });
      select_cuentah.load(function (cb) {
        cb();
      });
    });
  }

  function buscarCuentaAuxiliar() {
    u.resetSelect(select_cuenta_auxd);
    u.resetSelect(select_cuenta_auxh);
    if (!query.cuentad || !query.cuentad.length || !query.cuentah || !query.cuentah.length) return;
    select_cuenta_auxd.enable();
    select_cuenta_auxh.enable();
  }
