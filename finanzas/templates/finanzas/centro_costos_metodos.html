<script type="text/javascript">
  var query = {};
  var api = u.getApiUrl();
  var pad = 0;
  var cuenta = 0;
  var today = new Date();

  var select_empresa, $select_empresa;
  var select_cuentad, $select_cuentad;

  $(document).ready(function () {
    u.hideNav();
    initDate();
    initSelects();

  function initDate() {
    u.defaultDatepicker();

    $('#periodo .form-control').datepicker({
      format: "yyyy",
      startView: 2,
      minViewMode: 2,
      maxViewMode: 2,
      autoclose: true
    });

    $('.input-daterange').datepicker({
      todayBtn: "linked",
      startView: 1,
      minViewMode: 1,
      maxViewMode: 1,
      format: "MM"
    });

    $('.input-daterange .form-control').datepicker().on('changeDate', function (e) {
      query[this.name] = e.format('mm');
      console.log(query);
    });

    $('#periodo .form-control').datepicker().on('changeDate', function (e) {
      query[this.name] = this.value;
      console.log(query);
    });

    $('.input-date .form-control').datepicker('setDate', today);
    $('.input-date .form-control').datepicker('update');
  }

  function initSelects() {
    $.extend(true, $.fn.selectize.defaults, {
      onChange: function (value) {
        query[this.$input.attr('name')] = value;
        console.log(query);
      }
    });

    $select_empresa = $('#select-empresa').selectize({
      valueField: 'Cod_Empresa',
      labelField: 'Des_Empresa',
      searchField: 'Des_Empresa',
      preload: true,
      load: function (q, callback) {
        u.get_empresas({{ user }}, function (d) {
          callback(d.data);
        });
      }
    });
    select_empresa = $select_empresa[0].selectize;

    $select_cuentad = $('#select-cuentad').selectize({
      valueField: 'CodPlanCta',
      labelField: 'Nombre',
      searchField: 'Nombre'
    });
    select_cuentad = $select_cuentad[0].selectize;
    select_cuentad.disable();

    $select_cuentah = $('#select-cuentah').selectize({
      valueField: 'CodPlanCta',
      labelField: 'Nombre',
      searchField: 'Nombre'
    });
    select_cuentah = $select_cuentah[0].selectize;
    select_cuentah.disable();
  }

  function buscarCuenta() {
    if (!query.empresa || !query.empresa.length) return;
    if (!query.periodo || !query.periodo.length) return;
    // resetear selects
    select_cuentad.disable();
    select_cuentad.clearOptions();
    select_cuentah.disable();
    select_cuentah.clearOptions();

    $.get(api + 'cuenta/select/' + query.empresa + '/' + query.periodo).done(function (d) {
      //cargar resultados y habilitar options
      select_cuentad.load(function (cb) {
        cb(d.data);
        select_cuentad.enable();
      });

      select_cuentah.load(function (cb) {
        cb(d.data);
        select_cuentah.enable();
      });
    }).fail(function () {
      select_cuentad.load(function (cb) {
        cb();
      });
      select_cuentah.load(function (cb) {
        cb();
      });
    }).done(function () {
      $.get(api + 'cuentaauxi/select/' + query.empresa + '/' + query.periodo).done(function (d) {
        console.log(d);
      });
    });
  }

  function filtro_cuenta() {
    var filtros = null
    if ($('[name=codigo]').val() == "CO") {
      filtros = JSON.stringify({codigo: $('[name=filtro]').val()});
    } else {
      filtros = JSON.stringify({nombre: $('[name=filtro]').val()});
    }

    $.ajax("http://" + aux1[0] + ":3000/api/v1/cuentaauxi/query/" + $('[name=periodo]').val() + "/" + $('[name=empresa]').val() + "/" + $('[name=cuentad]').val() + "/" + $('[name=cuentah]').val(), {
      method: 'POST',
      contentType: 'application/json',
      data: filtros
    }).done(
            function (data) {
              if (data != null) {
                var string = "";
                for (var i = 0; i < data.data.length; i++) {
                  string += '<tr id="cuenta-row-' + data.data[i].CodPlanAux + '">' +
                          '<td class="codigo">' + data.data[i].CodPlanAux + '</td>' +
                          '<td class="nombre">' + data.data[i].Nombre + '</td>' +
                          '<td class="padre">' + data.data[i].CodPlanCta + '</td>' +
                          '<td><a class="btn btn-success btn-sm" onclick="cargar_cuenta(&quot;' + data.data[i].CodPlanAux + '&quot;)" title="Selecionar"><i class="fa fa-check"></i></td>' +
                          '</tr>';

                }
                $('#tableCuentas tbody').html(string);
              }
            }
    );
  }

  function cargar_cuenta(a) {
    $("#modalCuentas").modal("hide");
    console.log($('#fromcall').val())
    if ($('#fromcall').val() == "cuentaad_name") {
      $('[name=cuentaad]').val($('#cuenta-row-' + a).children('.codigo').text());
      $('[name=cuentaad_name]').val($('#cuenta-row-' + a).children('.codigo').text() + ' - ' + $('#cuenta-row-' + a).children('.nombre').text());
    } else {
      $('[name=cuentaah]').val($('#cuenta-row-' + a).children('.codigo').text());
      $('[name=cuentaah_name]').val($('#cuenta-row-' + a).children('.codigo').text() + ' - ' + $('#cuenta-row-' + a).children('.nombre').text());
    }
  }
