function filtro_cuenta(){
    var filtros = null
    if ($('[name=codigo]').val() == "CO") {
        filtros = JSON.stringify({codigo: $('[name=filtro]').val()});
    } else {
       filtros = JSON.stringify({nombre: $('[name=filtro]').val()}); 
    }
    
    $.ajax("http://"+aux1[0]+":3000/api/v1/cuentaauxi/query/"+$('[name=periodo]').val()+"/"+$('[name=empresa]').val()+"/"+$('[name=cuentad]').val()+"/"+$('[name=cuentah]').val(),{method:'POST', contentType:'application/json', data: filtros}).done(
        function(data) {
            if (data != null){
                var string = "";
                for (var i=0;i < data.data.length;i++){
                        string+= '<tr id="cuenta-row-'+data.data[i].CodPlanAux+'">'+
                                    '<td class="codigo">'+data.data[i].CodPlanAux+'</td>'+
                                    '<td class="nombre">'+data.data[i].Nombre+'</td>'+
                                    '<td class="padre">'+data.data[i].CodPlanCta+'</td>'+

                }

        }
    );
