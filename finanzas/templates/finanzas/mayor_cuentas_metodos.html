  function setCancelState(running) {
    var $btn = $('#cancelar-consulta-mayor');
    if (!$btn.length) return;
    if (running) {
      $btn.removeClass('is-disabled');
    } else {
      $btn.addClass('is-disabled');
    }
  }

  function cancelMayorProcess() {
    stopRequested = true;
    if (activeCabXhr && typeof activeCabXhr.abort === 'function') {
      activeCabXhr.abort();
    }
    while (activeDetailXhrs.length > 0) {
      var xhr = activeDetailXhrs.pop();
      if (xhr && typeof xhr.abort === 'function') {
        xhr.abort();
      }
    }
    detailQueue = [];
    detailCursor = 0;
    setCancelState(false);
    $loading.hide();
  }

  function finishMayorProcess() {
    setCancelState(false);
    $loading.hide();
  }

  function runDetailQueue() {
    if (stopRequested) return;
    while (!stopRequested && activeDetailXhrs.length < detailConcurrency && detailCursor < detailQueue.length) {
      (function () {
        var item = detailQueue[detailCursor++];
        var xhr = cargar_detalle(
          item.cuenta,
          item.empresa,
          item.periodo,
          item.fechad,
          item.fechah,
          item.moneda,
          item.tipoasiento,
          item.nombre,
          item.runId
        );
        if (!xhr || typeof xhr.always !== 'function') return;
        activeDetailXhrs.push(xhr);
        xhr.always(function () {
          var idx = activeDetailXhrs.indexOf(xhr);
          if (idx >= 0) activeDetailXhrs.splice(idx, 1);
          if (!stopRequested && detailCursor >= detailQueue.length && activeDetailXhrs.length === 0) {
            finishMayorProcess();
            return;
          }
          runDetailQueue();
        });
      })();
    }
  }

  function getInforme() {
    cancelMayorProcess();
    stopRequested = false;
    currentRunId += 1;
    var runId = currentRunId;
    var empresa = (select_empresa && typeof select_empresa.getValue === 'function') ? select_empresa.getValue() : query.empresa;
    var periodo = query.periodo;
    var cuentad = (select_cuentad && typeof select_cuentad.getValue === 'function') ? select_cuentad.getValue() : query.cuentad;
    var cuentah = (select_cuentah && typeof select_cuentah.getValue === 'function') ? select_cuentah.getValue() : query.cuentah;
    var fechad = query.desde;
    var fechah = query.hasta;
    var moneda = (select_moneda && typeof select_moneda.getValue === 'function') ? select_moneda.getValue() : query.moneda;
    var incluir = $("#incluir").prop('checked');
    var tipoasiento = (select_tipo_asiento && typeof select_tipo_asiento.getValue === 'function') ? select_tipo_asiento.getValue() : query.tipoAsiento;

    if (!tipoasiento || tipoasiento === " ") tipoasiento = "undefined";
    if (!moneda || moneda === " ") moneda = "LO";

    query.empresa = empresa;
    query.cuentad = cuentad;
    query.cuentah = cuentah;
    query.moneda = moneda;
    query.tipoAsiento = tipoasiento;

    if (incluir) {
      incluir = "SI"
    } else {
      incluir = "NO"
    }
    if (!moneda || moneda === " ") {
      moneda = "LO";
      query.moneda = "LO";
      if (select_moneda && typeof select_moneda.setValue === 'function') {
        select_moneda.setValue("LO", true);
      }
    }
    // Permitir cuentas vacias: backend aplicara "sin filtro de rango" cuando ambos esten vacios.
    if ((!cuentad || cuentad === " ") && (!cuentah || cuentah === " ")) {
      cuentad = "NINGUNA";
      cuentah = "NINGUNA";
    } else {
      if ((!cuentad || cuentad === " ") && cuentah) cuentad = cuentah;
      if ((!cuentah || cuentah === " ") && cuentad) cuentah = cuentad;
    }

    h = checkTime(today.getHours())
    m = checkTime(today.getMinutes())
    s = checkTime(today.getSeconds())

    if (periodo == "" || periodo == null || periodo == " " || !empresa || !fechad || !fechah) {
      alert("No hay datos suficientes para generar el listado")
    } else {
      $('.collapse').collapse('hide')
      $('#table-div').empty()
      detailQueue = [];
      detailCursor = 0;
      activeDetailXhrs = [];
      $loading.show();
      $empty.hide();
      setCancelState(true);
      activeCabXhr = $.ajax({
        url: api + "mayorcuenta/cab/" + empresa + "/" + periodo + "/" + fechad + "/" + fechah + "/" + tipoasiento + "/" + cuentad + "/" + cuentah + "/" + incluir,
        method: 'GET',
        timeout: 180000
      }).done(function (data) {
        if (stopRequested || runId !== currentRunId) return;
        var parents = (data && data[1] && data[1].data2) ? data[1].data2 : [];
        var accounts = (data && data[0] && data[0].data1) ? data[0].data1 : [];
        if (!parents.length) {
          $empty.show();
          finishMayorProcess();
          return;
        }
        var accountsByParent = {};
        var seenAccount = {};
        for (var i = 0; i < parents.length; i++) {
          accountsByParent[parents[i].Codplanctapad] = [];
        }
        for (var j = 0; j < accounts.length; j++) {
          var acc = accounts[j];
          var key = String(acc.Codplancta);
          if (!accountsByParent.hasOwnProperty(acc.Codplanctapad)) continue;
          if (seenAccount[key]) continue;
          seenAccount[key] = true;
          accountsByParent[acc.Codplanctapad].push(acc);
        }

        var html = '';
        for (var p = 0; p < parents.length; p++) {
          var parent = parents[p];
          html += '<div id="pad-' + parent.Codplanctapad + '"><hr size="50" style="height: 0px;margin-top: 0px;margin-bottom: 0px;border-top-width: 5px;padding-bottom: 5px;">' +
            '<b>' + parent.Codplanctapad + '&nbsp;&nbsp;&nbsp;&nbsp;' + parent.NOMBREPLANCTAPAD + '</b></div>';
          var list = accountsByParent[parent.Codplanctapad] || [];
          for (var k = 0; k < list.length; k++) {
            var item = list[k];
            html += '<div id="cuenta-' + item.Codplancta + '" style="padding-top: 5px;">' +
              '&nbsp;&nbsp;&nbsp;&nbsp;<b>' + item.Codplancta + '&nbsp;&nbsp;&nbsp;&nbsp;' + item.NOMBREPLANCTA + '</b>' +
                                '<table id="tabla-' + item.Codplancta + '" class="table table-striped table-bordered nowrap report-mayor-table" cellspacing="0" width="100%"><thead></thead><tbody></tbody><tfoot></tfoot></table></div>';
            detailQueue.push({
              cuenta: item.Codplancta,
              empresa: empresa,
              periodo: periodo,
              fechad: fechad,
              fechah: fechah,
              moneda: moneda,
              tipoasiento: tipoasiento,
              nombre: item.NOMBREPLANCTA,
              runId: runId
            });
          }
        }
        $('#table-div').html(html);
        if (!detailQueue.length) {
          finishMayorProcess();
          return;
        }
        runDetailQueue();
      }).fail(function (xhr, status) {
        if (runId !== currentRunId) return;
        if (status !== 'abort') {
          $empty.show();
          alert('La consulta tardó demasiado o falló. Ajuste los filtros o pruebe nuevamente.');
        }
        finishMayorProcess();
      });
    }
  }

  function exportarMayorExcel() {
    var tables = $('#table-div table.report-mayor-table');
    if (!tables.length) {
      alert('No hay datos para exportar.');
      return;
    }
    var html = '<html><head><meta charset="utf-8"></head><body>';
    html += '<h3>Mayor de Cuentas</h3>';
    $('#table-div > div').each(function () {
      if (this.id && this.id.indexOf('pad-') === 0) {
        html += '<h4>' + $(this).text() + '</h4>';
      }
      if (this.id && this.id.indexOf('cuenta-') === 0) {
        html += '<div>' + $(this).find('b:first').text() + '</div>';
        html += $(this).find('table')[0].outerHTML;
      }
    });
    html += '</body></html>';

    var blob = new Blob([html], { type: 'application/vnd.ms-excel;charset=utf-8;' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'mayor_cuentas_' + new Date().toISOString().slice(0, 10) + '.xls';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function exportarMayorPdf() {
    var content = $('#table-div').html();
    if (!content || !content.trim()) {
      alert('No hay datos para exportar.');
      return;
    }
    var w = window.open('', '_blank');
    w.document.write('<html><head><title>Mayor de Cuentas</title><meta charset="utf-8">');
    w.document.write('<style>body{font-family:Arial,sans-serif;font-size:10px;margin:10px;} h3{margin:0 0 8px;} h4{margin:8px 0 4px;} table{width:100%;border-collapse:collapse;margin-bottom:10px;} th,td{border:1px solid #ccc;padding:4px 6px;} thead th{background:#eef3fb;} tfoot th,tfoot td{font-weight:700;}</style>');
    w.document.write('</head><body>');
    w.document.write('<h3>Mayor de Cuentas</h3>');
    w.document.write(content);
    w.document.write('</body></html>');
    w.document.close();
    w.focus();
    w.print();
  }

        cb();
      });
