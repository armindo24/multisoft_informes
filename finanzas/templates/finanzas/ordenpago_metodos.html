<script type="text/javascript">
  var query = {};
  var api = u.getApiUrl();
  var convertir_rever = u.numFormat;

  var today = new Date();
  var cant_reg = 10;
  var ult_reg = 10;
  var lista = null;

  $(document).ready(function () {
    u.hideNav();
    $("#cabecera").hide();

    initDates();
  });


  function initDates() {
    u.defaultDatepicker();
    $('.input-daterange').datepicker({
      todayBtn: "linked",
      language: "es",
      format: "yyyy-mm-dd",
      orientation: "bottom auto"
    });

    $('.input-date .form-control').datepicker().on('changeDate', function (e) {
      query[this.name] = this.value;
      console.log(query);
    });

    $('.input-date .form-control').datepicker('setDate', today);
  }

  function buscar() {
    var desde = $("[name=fechad]").val()
    var hasta = $("[name=fechah]").val()
    var empresa = $("[name=empresa]").val()
    var sucursal = $("[name=sucursal]").val()
    var tipoop = $("[name=tipoop]").val()
    var comprobante = $("[name=comprobante]").val()
    var tipoproveedor = $("[name=tipoproveedor]").val()
    var proveedor = $("[name=proveedor]").val()
    if (sucursal == "" || sucursal == null)
      sucursal = " ";
    if (tipoop == "" || tipoop == null)
      tipoop = " ";
    if (comprobante == "" || comprobante == null)
      comprobante = " ";
    if (tipoproveedor == "" || tipoproveedor == null)
      tipoproveedor = " ";
    if (proveedor == "" || proveedor == null)
      proveedor = " ";
    if (desde == " " || desde == "" || desde == null || hasta == " " || hasta == "" || hasta == null) {
      alert("No hay datos suficientes para generar el listado")
    } else {
      $('.collapse').collapse('hide')
      $('#table-div').empty()
      $('#table-div').append("<b>Recuperando datos.</b>")
      $.get("http://" + aux1[0] + ":3000/api/v1/ordenpago/list/" + empresa + "/" + sucursal + "/" + tipoop + "/" + comprobante + "/" + tipoproveedor + "/" + proveedor + "/" + desde + "/" + hasta,
              function (data) {
                if (data.data.length > 0) {
                  $('#table-div').empty()
                  var tableta = '<table id="resultados" class="table table-striped table-hover table-bordered table-filter scroll" tyle="width:90%">' +
                          '<thead>' +
                          '<tr>' +
                          '<th>Proveedor</th>' +
                          '<th>Sucursal</th>' +
                          '<th>OP N&#176;</th>' +
                          '<th>Fecha</th>' +
                          '<th>Monto</th>' +
                          '</tr>' +
                          '</thead>' +
                          '<tbody></tbody>' +
                          '</table>'
                  $('#table-div').append(tableta)
                  var string = ""
                  for (var i = 0; i < data.data.length; i++) {
                    string += '<tr>' +
                            '<td>' + data.data[i].RazonSocial + '</td>' +
                            '<td>' + data.data[i].Des_Sucursal + '</td>' +
                            '<td>' + data.data[i].NroOP + '/' + data.data[i].des_tp_comp + '</td>' +
                            '<td>' + data.data[i].Fecha + '</td>' +
                            '<td style="text-align: right;">' + convertir_rever(data.data[i].TotalImporte) + '</td>' +
                            '</tr>'
                  }
                  $('#resultados tbody').html(string)
                } else {
                  $('#table-div').empty()
                  $('#table-div').append("<b>No se han encontrado datos.</b>")
                }
              }
      );
    }
  }

  function buscar_comprobante() {
    $.get("http://" + aux1[0] + ":3000/api/v1/empresas/" + document.getElementsByName('empresa')[0].value + "/comprobantes/tipos",
            function (data) {
              if (data != null) {
                var select = document.getElementsByName("comprobante")[0]
                remover(select);
                var option = document.createElement("option");
                option.text = "NINGUNO";
                select.add(option);
                for (var i = 0; i < data.data.length; i++) {
                  var option = document.createElement("option");
                  option.value = data.data[i].Cod_Tp_Comp;
                  option.text = data.data[i].des_tp_comp;
                  select.add(option);
                }
                SelectElement(data.data[0].Cod_Tp_Comp, 'comprobante')
                $('.chosen-select').trigger('chosen:updated');
              }
            }
    );
  }

  function buscar_proveedor() {
    $.get("http://" + aux1[0] + ":3000/api/v1/proveedor/select/" + document.getElementsByName('empresa')[0].value + "/" + document.getElementsByName('tipoproveedor')[0].value,
            function (data) {
              if (data != null) {
                var select = document.getElementsByName("proveedor")[0]
                remover(select);

                option.text = "NINGUNO";

                }

    if (data.length > 0) {
      console.log('Hay datos');
      var vector = []
      for (var a = 0; a < data.length; a++) {
        vector.push("'" + data[a].empresa + "'")
      }
      var str = JSON.stringify({empresas: vector});
      $.ajax("http://" + aux1[0] + ":3000/api/v1/empresa/inin/select", {
        method: 'POST',

                    option.value = data.data[i].Cod_Empresa;
                    option.text = data.data[i].Des_Empresa;
                    select.add(option);
                  }
                  SelectElement(data.data[0].Cod_Empresa, 'empresa')

                  $.get("http://" + aux1[0] + ":3000/api/v1/empresas/" + document.getElementsByName('empresa')[0].value + "/comprobantes/tipos",
                          function (data) {
                            if (data != null) {
                              var select = document.getElementsByName("comprobante")[0]
                              remover(select);
                              var option = document.createElement("option");
                              option.text = "NINGUNO";
                              select.add(option);
                              for (var i = 0; i < data.data.length; i++) {
                                var option = document.createElement("option");
                                option.value = data.data[i].Cod_Tp_Comp;
                                option.text = data.data[i].des_tp_comp;
                                select.add(option);
                              }
                              SelectElement(data.data[0].Cod_Tp_Comp, 'comprobante')
                            }
                          }
                  );

                  $.get("http://" + aux1[0] + ":3000/api/v1/proveedor/select/" + document.getElementsByName('empresa')[0].value + "/" + document.getElementsByName('tipoproveedor')[0].value,
                          function (data) {
                            if (data != null) {
                              var select = document.getElementsByName("proveedor")[0]
                              remover(select);
                              var option = document.createElement("option");
                              option.text = "NINGUNO";
                              select.add(option);
                              for (var i = 0; i < data.data.length; i++) {

                                option.value = data.data[i].CodProv;
                                option.text = data.data[i].RazonSocial;
                                select.add(option);
                              }
                              SelectElement(data.data[0].CodProv, 'proveedor')
                            }
                          }
                  );

                  $.get("http://" + aux1[0] + ":3000/api/v1/sucursal/select/" + document.getElementsByName('empresa')[0].value,
                          function (data) {
                            if (data != null) {
                              var select = document.getElementsByName("sucursal")[0]
                              remover(select);
                              var option = document.createElement("option");
                              option.text = "NINGUNA";
                              select.add(option);
                              for (var i = 0; i < data.data.length; i++) {
                                var option = document.createElement("option");
                                option.value = data.data[i].Cod_Sucursal;
                                option.text = data.data[i].Des_Sucursal;
                                select.add(option);
                              }
                              SelectElement(data.data[0].Cod_Sucursal, 'sucursal')
                              $('.chosen-select').trigger('chosen:updated');

                            }
                          }
                  );
                }
              }
      );
    }
  }
</script>
