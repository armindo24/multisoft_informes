function remover(selectbox){
    var i;
    for(i=selectbox.options.length-1;i>=0;i--)
    {
        selectbox.remove(i);
    }
} 

function SelectElement(value,name){    
    var element = document.getElementsByName(name)[0];
    element.value = value;
}

function buscar(){
		var desde = $("[name=fechad]").val()
		var hasta = $("[name=fechah]").val()
		var empresa = $("[name=empresa]").val()
		var sucursal = $("[name=sucursal]").val()
		var tipoop = $("[name=tipoop]").val()
		var comprobante = $("[name=comprobante]").val()
		var tipoproveedor = $("[name=tipoproveedor]").val()
		var proveedor = $("[name=proveedor]").val()
		if (sucursal == "" || sucursal == null)
			sucursal = " ";
		if (tipoop == "" || tipoop == null)
			tipoop = " ";
		if (comprobante == "" || comprobante == null)
			comprobante = " ";
		if (tipoproveedor == "" || tipoproveedor == null)
			tipoproveedor = " ";
		if (proveedor == "" || proveedor == null)
			proveedor = " ";
		if (desde == " " || desde == "" || desde == null || hasta == " " || hasta == "" || hasta == null){
			alert("No hay datos suficientes para generar el listado")		
		} else {
			$('.collapse').collapse('hide')
			$.get("http://"+aux1[0]+":3000/api/v1/ordenpago/list/"+empresa+"/"+sucursal+"/"+tipoop+"/"+comprobante+"/"+tipoproveedor+"/"+proveedor+"/"+desde+"/"+hasta,

			    	if (data != null){
			    		$('#table-div').empty()

							    		'<thead>'+
							    			'<tr>'+
							    				'<th>Proveedor</th>'+
							    				'<th>Sucursal</th>'+
							    				'<th>OP N&#176;</th>'+
							    				'<th>Fecha</th>'+
							    				'<th>Monto</th>'+
							    			'</tr>'+
							    		'</thead>'+
							    		'<tbody></tbody>'+
							    	'</table>'
						$('#table-div').append(tableta)
						var string=""
		    			for (var i=0; i < data.data.length; i++) {
		    				string+='<tr>'+
									   '<td>'+data.data[i].RazonSocial+'</td>'+
									   '<td>'+data.data[i].Des_Sucursal+'</td>'+
									   '<td>'+data.data[i].NroOP + '/' + data.data[i].des_tp_comp+'</td>'+
									   '<td>'+data.data[i].Fecha+'</td>'+
									   '<td style="text-align: right;">'+convertir_rever(data.data[i].TotalImporte)+'</td>'+
								    '</tr>'
		    			}
		    			$('#resultados tbody').html(string)
			    	}
			    }
			);  
		}
}

function buscar_comprobante(){
	$.get("http://"+aux1[0]+":3000/api/v1/comprobante/select/"+document.getElementsByName('empresa')[0].value,
	    function(data) {
	    	if (data != null){
	    		var select = document.getElementsByName("comprobante")[0]
	    		remover(select);
	    		var option = document.createElement("option");
				option.text = "NINGUNO";
				select.add(option);
				for (var i=0;i < data.data.length;i++){
					var option = document.createElement("option");
					option.value = data.data[i].Cod_Tp_Comp;
					option.text =data.data[i].des_tp_comp;
					select.add(option);
				}
				SelectElement(data.data[0].Cod_Tp_Comp,'comprobante')
				$('.chosen-select').trigger('chosen:updated');
	    	}
	    }
	);  
}
