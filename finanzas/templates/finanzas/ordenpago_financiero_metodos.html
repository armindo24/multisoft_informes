<script type="text/javascript">
  var today = new Date();
  var $select_empresa, select_empresa;
  var $select_tipoop, select_tipoop;
  var $select_proveedor, select_proveedor;
  var $select_moneda, select_moneda;
  var $messages, $loading, $empty;
  var api = u.getApiUrl();
  var query = {};

  $(document).ready(function () {
    $messages = $("#messages");
    $loading = $messages.find("#loading");
    $empty = $messages.find("#empty");

    u.hideNav();
    initDates();
    initSelects();
    $('#table-div').empty();
  });

  function initDates() {
    u.defaultDatepicker();
    $('.input-daterange').datepicker({
      todayBtn: "linked",
      language: "es",
      format: "yyyy-mm-dd",
      orientation: "bottom auto",
      autoclose: true
    });
    $('.input-date .form-control').datepicker().on('changeDate', function (e) {
      query[this.name] = this.value;
    });
    $('.input-date .form-control').datepicker('setDate', today);
  }

  function initSelects() {
    $.extend(true, $.fn.selectize.defaults, {
      onChange: function (value) {
        query[this.$input.attr('name')] = value;
      }
    });

    $select_moneda = $('#select-moneda').selectize({
      options: [
        {value: 'ALL', text: 'Todos'},
        {value: 'GS', text: 'GUARANIES'},
        {value: 'US', text: 'DOLARES'}
      ],
      onChange: function (value) {
        query.moneda = value;
      }
    });
    select_moneda = $select_moneda[0].selectize;
    select_moneda.setValue('ALL');

    $select_empresa = $('#select-empresa').selectize({
      valueField: 'Cod_Empresa',
      labelField: 'Des_Empresa',
      searchField: 'Des_Empresa',
      preload: true,
      load: function (q, callback) {
        u.get_empresas({{ user }},'Integrado', function (d) {
          callback(d.data);
        });
      },
      onChange: function (value) {
        query.empresa = value;
        if (select_proveedor) {
          select_proveedor.clearOptions();
          if (!value.length) return;
          select_proveedor.load(function (cb) {
            $.get(api + '/proveedor/select/' + query.empresa).done(function (res) {
              select_proveedor.enable();
              cb(res.data);
            }).fail(function () {
              cb();
            });
          });
          select_proveedor.enable();
        }
        if (select_tipoop) {
          select_tipoop.clearOptions();
          if (!value.length) return;
          select_tipoop.load(function (cb) {
            $.get(api + '/op/' + query.empresa + '/comprobantes/tipos').done(function (res) {
              select_tipoop.enable();
              cb(res.data);
            }).fail(function () {
              cb();
            });
          });
          select_tipoop.enable();
        }
      }
    });
    select_empresa = $select_empresa[0].selectize;

    $select_proveedor = $('#select-proveedor').selectize({
      valueField: 'CodProv',
      labelField: 'RazonSocial',
      searchField: 'RazonSocial',
      onChange: function (value) {
        query.proveedor = value;
      }
    });
    select_proveedor = $select_proveedor[0].selectize;
    select_proveedor.disable();

    $select_tipoop = $('#select-tipoop').selectize({
      valueField: 'Cod_Tp_Comp',
      labelField: 'des_tp_comp',
      searchField: 'des_tp_comp',
      onChange: function (value) {
        query.tipoop = value;
      }
    });
    select_tipoop = $select_tipoop[0].selectize;
    select_tipoop.disable();
  }

  function getInforme() {
    var desde = query.desde;
    var hasta = query.hasta;
    var empresa = query.empresa;
    var tipoop = query.tipoop;
    var moneda = query.moneda;
    var proveedor = query.proveedor;

    if (tipoop == "" || tipoop == null)
      tipoop = "undefined";
    if (moneda == "" || moneda == null)
      moneda = "ALL";
    if (proveedor == "" || proveedor == null)
      proveedor = "undefined";

    if (desde == " " || desde == "" || desde == null || hasta == " " || hasta == "" || hasta == null) {
      alert("No hay datos suficientes para generar el listado");
      return;
    }

    $('.collapse').collapse('hide');
    $('#table-div').empty();
    $loading.show();
    $empty.hide();

    $.get(api + "ordenpago_financiero/list/" + empresa + "/" + tipoop + "/" + moneda + "/" + proveedor + "/" + desde + "/" + hasta,
      function (data) {
        if (data.data.length > 0) {
          var empresaText = '';
          if (select_empresa && select_empresa.getItem) {
            var item = select_empresa.getItem(empresa);
            empresaText = item && item.text ? item.text() : '';
          }
          var tipoText = '';
          if (select_tipoop && select_tipoop.getItem && tipoop && tipoop !== 'undefined') {
            var titem = select_tipoop.getItem(tipoop);
            tipoText = titem && titem.text ? titem.text() : '';
          }
          var monedaText = '';
          if (select_moneda && select_moneda.getItem) {
            var mitem = select_moneda.getItem(moneda);
            monedaText = mitem && mitem.text ? mitem.text() : '';
          }
          var provText = '';
          if (select_proveedor && select_proveedor.getItem && proveedor && proveedor !== 'undefined') {
            var pitem = select_proveedor.getItem(proveedor);
            provText = pitem && pitem.text ? pitem.text() : '';
          }
          var filtersHtml = '';
          filtersHtml += '<span><b>Fecha de Inicio:</b> ' + (desde || '') + '</span>';
          filtersHtml += ' &nbsp; <span><b>Fecha Fin:</b> ' + (hasta || '') + '</span>';
          filtersHtml += ' &nbsp; <span><b>Moneda:</b> ' + (monedaText || '') + '</span>';
          filtersHtml += ' &nbsp; <span><b>Tipos OP:</b> ' + (tipoText || '') + '</span>';
          filtersHtml += ' &nbsp; <span><b>Proveedor:</b> ' + (provText || '') + '</span>';
          filtersHtml += ' &nbsp; <span><b>Empresa:</b> ' + (empresaText || '') + '</span>';
          $('#report-filters').html(filtersHtml);
          $('#report-header').show();

          var table_string = '<table id="resultados" class="table table-striped table-bordered nowrap report-financiero-table" cellspacing="0" width="100%">'+
            '<thead>'+
            '<tr>'+
              '<th>Estado de Pago</th>'+
              '<th>N° de Asiento</th>'+
              '<th>Fecha de Proceso</th>'+
              '<th>Usuario de Registro</th>'+
              '<th>Cod. de Proveedor</th>'+
              '<th>R.U.C.</th>'+
              '<th>Nombre de Proveedor</th>'+
              '<th>N° de Factura</th>'+
              '<th>Fecha de la Fact.</th>'+
              '<th>Vto. de la Fact.</th>'+
              '<th>Mto. de la Factura</th>'+
              '<th>Mto. Liquidado</th>'+
              '<th>Moneda (Factura)</th>'+
              '<th>N° de Orden de Pago</th>'+
              '<th>Monto de O.P.</th>'+
              '<th>Moneda de O.P.</th>'+
              '<th>Concepto de Pago</th>'+
              '<th>Forma de Pago</th>'+
              '<th>N° de Cuenta de Pago</th>'+
            '</tr>'+
            '</thead>'+
            '<tbody></tbody>'+
            '</table>';
          $('#table-div').append(table_string);

          function addCommas(nStr) {
            nStr += '';
            var x = nStr.split('.');
            var x1 = x[0];
            var x2 = x.length > 1 ? ',' + x[1] : '';
            var rgx = /(\d+)(\d{3})/;
            while (rgx.test(x1)) {
              x1 = x1.replace(rgx, '$1' + '.' + '$2');
            }
            return x1 + x2;
          }

          function fmtNumber(value) {
            if (value === null || typeof value === 'undefined' || value === '') return '';
            var s = String(value).trim();
            if (!s.length) return '';
            var n = parseFloat(s);
            if (isNaN(n)) return s;
            return addCommas(n.toFixed(2).replace(/\.00$/, ''));
          }

          var total_mto_factura = 0;
          var total_mto_liquidado = 0;
          var total_monto_op = 0;
          var string = "";
          for (var i = 0; i < data.data.length; i++) {
            var r = data.data[i];
            var monto_factura = parseFloat(r.monto_factura) || 0;
            var monto_liquidado = parseFloat(r.saldo) || 0;
            var monto_op = parseFloat(r.importe) || 0;
            total_mto_factura += monto_factura;
            total_mto_liquidado += monto_liquidado;
            total_monto_op += monto_op;
            string += '<tr>' +
              '<td>' + (r.estado_op || '') + '</td>' +
              '<td>' + (r.nrotransac || '') + '</td>' +
              '<td>' + (r.fecha || '') + '</td>' +
              '<td>' + (r.cod_usuario || '') + '</td>' +
              '<td>' + (r.proveedor || '') + '</td>' +
              '<td>' + (r.ruc || '') + '</td>' +
              '<td>' + (r.descipcion_proveedor || r.descripcion_proveedor || '') + '</td>' +
              '<td>' + (r.nro_factura || '') + '</td>' +
              '<td>' + (r.fechafact || '') + '</td>' +
              '<td>' + (r.fechavto || '') + '</td>' +
              '<td style="text-align:right;">' + fmtNumber(r.monto_factura) + '</td>' +
              '<td style="text-align:right;">' + fmtNumber(r.saldo) + '</td>' +
              '<td>' + (r.descripcion_moneda_factura || '') + '</td>' +
              '<td>' + (r.nroop || '') + '</td>' +
              '<td style="text-align:right;">' + fmtNumber(r.importe) + '</td>' +
              '<td>' + (r.descripcion_moneda_op || '') + '</td>' +
              '<td>' + (r.concepto || '') + '</td>' +
              '<td>' + (r.descrip || r.descripcion_banco || '') + '</td>' +
              '<td>' + (r.ctabanco || '') + '</td>' +
              '</tr>';
          }
          $('#resultados tbody').html(string);
          var resumen = '<div class="report-financiero-resumen">' +
            '<b>Resumen:</b> ' +
            'Mto. Factura: ' + fmtNumber(total_mto_factura) + ' | ' +
            'Mto. Liquidado: ' + fmtNumber(total_mto_liquidado) + ' | ' +
            'Monto O.P.: ' + fmtNumber(total_monto_op) +
            '</div>';
          $('#table-div').append(resumen);
          $('#resultados').DataTable({
            searching: false,
            language: u.spanish_dt,
            paging: false,
            ordering: false,
            info: false,
            scrollCollapse: true,
            scrollY: 430,
            scrollX: '100%'
          });
        } else {
          $('#table-div').empty();
          $empty.show();
          $('#report-header').hide();
        }
        $loading.hide();
      }
    );
  }

  function exportExcelFin() {
    var table = document.getElementById('resultados');
    if (!table) {
      alert('No hay datos para exportar.');
      return;
    }
    var rows = table.querySelectorAll('tr');
    var lines = [];
    for (var i = 0; i < rows.length; i++) {
      var cells = rows[i].querySelectorAll('th,td');
      var values = [];
      for (var j = 0; j < cells.length; j++) {
        var text = cells[j].innerText.replace(/\r?\n/g, ' ').trim();
        text = '"' + text.replace(/"/g, '""') + '"';
        values.push(text);
      }
      lines.push(values.join(';'));
    }
    var csv = '\uFEFF' + lines.join('\n');
    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    var link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'ordenes_pago_financiero.csv';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }

  function exportPdfFin() {
    printFin();
  }

  function printFin() {
    var table = document.getElementById('resultados');
    if (!table) {
      alert('No hay datos para imprimir.');
      return;
    }
    var header = document.getElementById('report-header');
    var resumen = document.querySelector('.report-financiero-resumen');
    var win = window.open('', '_blank');
    if (!win) return;
    win.document.open();
    win.document.write('<html><head><title>Ordenes de Pago - Financiero</title>');
    win.document.write('<style>body{font-family:Arial,Helvetica,sans-serif;font-size:9px;}');
    win.document.write('table{width:100%;border-collapse:collapse;}');
    win.document.write('th,td{border:1px solid #999;padding:2px 4px;white-space:nowrap;}');
    win.document.write('th{background:#d9edf7;}</style>');
    win.document.write('</head><body>');
    if (header) win.document.write(header.outerHTML);
    win.document.write(table.outerHTML);
    if (resumen) win.document.write(resumen.outerHTML);
    win.document.write('</body></html>');
    win.document.close();
    win.focus();
    win.print();
  }
</script>
