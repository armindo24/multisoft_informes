{% extends 'admin/base_site.html'%}
{% load staticfiles %}
{% block extrahead %}
	<link rel="stylesheet" href={% static 'css/jquery-ui.css' %}> 
    <link rel="stylesheet" href={% static 'chosen_v1.4.2/chosen.css' %}>
    <link rel="stylesheet" href={% static 'chosen_v1.4.2/docsupport/prism.css' %}>
    <script src={% static 'js/jquery-ui.js' %}></script>
    <script src={% static 'js/puntos-decimales.js' %}></script>
    <script src={% static 'js/jquery.maskedinput.min.js' %}></script>
    <script src={% static 'chosen_v1.4.2/chosen.jquery.js' %}></script>
	<script src={% static 'chosen_v1.4.2/docsupport/prism.js' %}></script>
	<script src={% static 'dajaxice/dajaxice.core.js' %}></script>
	{% include 'custom_permissions/asignar_empresa_usuario_metodos.html' %}
{% endblock %}

{% block header %}
	Asinación de Empresas:
{% endblock %}

{% block content %}
    <select data-placeholder="Usuario..." name="usuario" onchange="cargar_empresas_permisos(this.value);" class="chosen-select" tabindex="2">
        <option selected></option>
        {% for usuario in usuarios %}
            <option value="{{ usuario.id }}">{{ usuario.username }}</option>
        {% endfor %}
    </select>
    
    <div>
        <div style="width:50%" id="table">
    
        </div>
        <a id="addanother-button" class="btn btn-success" onclick="addanother();"><i class="fa fa-plus-square"></i></a>
    </div>
    
<div id="modalEmpresas" class="modal fade bs-example-modal-sm" tabindex="-1" data-backdrop="static" data-keyboard="false" role="dialog" aria-labelledby="mySmallModalLabel" aria-hidden="false">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Empresas</h3>
            </div>
            <div class="modal-body span3">
                    <center>
                        <table id="tableEmpresas" class="table table-striped table-hover table-bordered table-filter scroll">
                            <thead>
                                <th>Codigo</th>
                                <th>Empresa</th>
                                <th>Seleccionar</th>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </center>
              </div>
              <div class="modal-footer">
             </div>
        </div>
    </div>
</div>

{% endblock %}
