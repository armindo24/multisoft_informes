{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="">
  <meta name="author" content="">

  <title>MultiSoft - SIG</title>
  <link href="{% static "icon/favicon.ico" %}" rel="Shortcut Icon">

  <!-- Bootstrap Core CSS -->
  <link href="{% static "css/bootstrap.css" %}" rel="stylesheet">
  <!--link href="{% static "bootstrap/css/bootstrap.min.css" %}" rel="stylesheet"/-->

  <!-- Menu CSS -->
  <link href="{% static "css/menu.min.css" %}" rel="stylesheet">

  <!--link href="{% static "css/mycss.css" %}"rel="stylesheet"-->

  <!-- MetisMenu CSS -->
  <link href="{% static "css/plugins/metisMenu/metisMenu.min.css" %}" rel="stylesheet">

  <!-- Custom CSS -->
  <link href="{% static "css/sb-admin-2.css" %}" rel="stylesheet">
  <link href="{% static "css/menu-modern.css" %}" rel="stylesheet">

  <!-- Custom Fonts -->
  <link href="{% static "font-awesome/css/font-awesome.min.css" %}" rel="stylesheet" type="text/css">

  <!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
  <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
  <!--[if lt IE 9]>
        <script src="https://oss.maxcdn.com/libs/html5shiv/3.7.0/html5shiv.js"></script>
        <script src="https://oss.maxcdn.com/libs/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->

  <script>
    window.onload = function () {
      // mantener comportamiento previo: ocultar left menu en vista principal
      try { $('#page-wrapper').css('margin-left', '0px'); $('#my-left-menu').toggle(0); } catch(e){}
    };
  </script>

  <style>
    .link-tile {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 1;
      color: rgb(0, 0, 0, 1);
    }

    .page-header {
      margin-top: 130px;
    }

    @media (min-width: 768px) {
      .page-header {
        margin-top: 60px;
      }
    }
  </style>

  <style>
    .navbar-brand {
      font-size: 17px;
    }

    @media (min-width: 768px) {
      .navbar-brand {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
<div class="container">

  <!-- navbar -->
  <nav class="navbar navbar-default navbar-fixed-top" role="navigation" style="margin-bottom: 0; backgroud-color:">
    <div class="navbar-header">
      <button type="button" class="navbar-toggle" data-toggle="collapse" data-target=".navbar-collapse">
        <span class="sr-only">Toggle navigation</span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
      </button>

      <!--Toggle button-->
      <a id="toggle-left-menu" class="navbar-brand" href="#">
        <i class="fa fa-angle-left"></i>
      </a>

      <a id="main-brand" class="navbar-brand" href="#">
        MultiSoft SIG - Sistema de Información Gerencial
      </a>
    </div>
    <!-- /.navbar-header -->

    <ul class="nav navbar-top-links navbar-right">
      {% include "admin/menu/navbar_user.html" %}
    </ul>
  </nav>

  <div class="row">
    <div class="col-lg-12 col-xs-12">
      <h4 class="page-header">{% block header %}{% endblock %}</h4>
    </div>
  </div>

  <section class="modules-section">
    <div class="modules-grid">
      {% for modulo in modulos_usuario %}
      <a class="module-card" data-module="{{ modulo.0|slugify }}" href="/accounts/menu/?q={{ modulo.0 }}" title="{{ modulo.0 }}" tabindex="0">
        <div class="module-icon"><i class="{{ modulo.1 }}"></i></div>
        <div class="module-body">
          <h3>{{ modulo.0 }}</h3>
          <p class="module-action">Acceder <i class="fa fa-arrow-right"></i></p>
        </div>
      </a>
      {% endfor %}
    </div>
  </section>

  <script>
    // simple keyboard navigation: Enter on focused card
    document.addEventListener('keydown', function(e){
      if(e.key === 'Enter'){ var focus = document.activeElement; if(focus && focus.classList.contains('module-card')) focus.click(); }
    });
  </script>

  <!-- jQuery Version 1.11.0 -->
  <script src="{% static "js/jquery-1.11.0.js" %}"></script>

  <!-- Bootstrap Core JavaScript -->
  <script src="{% static "js/bootstrap.min.js" %}"></script>

  <!-- Metis Menu Plugin JavaScript -->
  <script src="{% static "js/metisMenu.min.js" %}"></script>

  <!-- Custom Theme JavaScript -->
  <script src="{% static "js/sb-admin-2.js" %}"></script>

</body>

</html>
