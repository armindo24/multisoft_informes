{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MultiSoft - SIG</title>
  <link href="{% static "icon/favicon.ico" %}" rel="Shortcut Icon">
  <link href="{% static "css/bootstrap.min.css" %}" rel="stylesheet">
  <link href="{% static "css/sb-admin-2.css" %}" rel="stylesheet">
  <link href="{% static "css/login-modern.css" %}" rel="stylesheet">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <img src="{% static "icon/favicon.ico" %}" alt="logo">
      <h1>MultiSoft</h1>
      <p class="subtitle">Recuperar acceso</p>
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_email">Email</label>
        <input id="id_email" class="form-control" type="email" name="email" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Enviar enlace</button>
    </form>

    <div class="login-footer">
      <a href="/accounts/login/">Volver a ingresar</a>
    </div>
  </div>
</div>
</body>
</html>
